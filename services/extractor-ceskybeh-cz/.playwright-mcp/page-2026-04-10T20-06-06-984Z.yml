                - heading "Půlmaraton Plzeňského kraje" [level=4] [ref=e134]
            - paragraph [ref=e135]: Závod v běhu na 21,097 km se startem a cílem v areálu Škodaland v Plzni. Nedílnou součástí jsou i další doprovodné běhy – krajská desítka, krajská pětka, týmový běh a dětské závody. Velmi náročná trať půlmaratonu vedoucí přes Litice, Šlovice, Dobřany a Lhotu zpět k vodní nádrži České údolí se stala oblíbeným závodem příznivců běhu. Dokladem oblíbenosti půlmaratonu je například účast naší současné nejlepší vytrvalkyně Marcely Joglové v roce 2017, kdy vítězstvím na tomto závodě vlastně neoficiálně odstartovala svoji skvělou běžeckou kariéru.
